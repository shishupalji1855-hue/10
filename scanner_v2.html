<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>10haath Scanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1b1b1b;
        --muted: #5b5b5b;
        --paper: #f7f3ea;
        --accent: #0f7a6d;
        --accent-2: #d9822b;
        --danger: #c23b22;
        --card: #ffffff;
        --border: #e2d8c5;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", system-ui, sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at top, #fff7e3, var(--paper));
      }

      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 28px 18px 80px;
      }

      header {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 14px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px;
        box-shadow: var(--shadow);
        margin-bottom: 16px;
      }

      .row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      .btn {
        border: none;
        padding: 12px 18px;
        border-radius: 12px;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }

      .btn.secondary {
        background: var(--accent-2);
      }

      .btn.danger {
        background: var(--danger);
      }

      label {
        display: block;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      input,
      textarea {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        font-family: inherit;
        font-size: 14px;
      }

      textarea {
        min-height: 90px;
      }

      .mono {
        font-family: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .hidden {
        display: none;
      }

      .timer {
        font-size: 22px;
        font-weight: 700;
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1 id="identityHeading">Loading...</h1>
        <div class="subtitle" id="identitySub"></div>
        <div class="subtitle mono">Build: 2026-03-12T22:05 IST</div>
        <div class="subtitle" style="color:#c23b22; font-weight:600;">
          NEW FLOW ACTIVE: Copy Link → Confirm → Save → OK to Send
        </div>
      </header>

      <section class="card" id="statusCard">
        <div class="subtitle" id="statusText">Fetching secure record...</div>
      </section>

      <section class="card" id="saviorCard">
        <h2>Step 1: Savior Verification</h2>
        <button class="btn" id="verifyBtn">VERIFY VIA WHATSAPP</button>

        <div id="logbook" class="hidden" style="margin-top: 14px;">
          <div class="row">
            <div>
              <label for="scannerNo">Scanner Mobile</label>
              <input id="scannerNo" placeholder="Scanner mobile number" />
            </div>
            <div>
              <label for="dikkat">Problem / Situation</label>
              <textarea id="dikkat" placeholder="Describe the issue"></textarea>
            </div>
          </div>
          <div style="margin-top: 12px;">
            <button class="btn secondary" id="logSubmit">FINAL SUBMIT</button>
          </div>
        </div>
      </section>

      <section class="card" id="ownerCard">
        <h2>Step 2: Owner SOS</h2>
        <div class="row">
          <div>
            <label for="pinInput">Security PIN</label>
            <input id="pinInput" type="password" placeholder="Enter owner PIN" />
          </div>
          <div style="display: flex; align-items: flex-end;">
            <button class="btn" id="pinCheck">Unlock SOS</button>
          </div>
        </div>
        <div id="sosButtons" class="hidden" style="margin-top: 14px;"></div>
      </section>

      <section class="card hidden" id="serviceCard"></section>
      <section class="card hidden" id="docCard"></section>
    </div>

    <script>
      const API_BASE_DEFAULT = "https://sheetdb.io/api/v1/vpozwh7cptzc4";
      const API_BASE =
        localStorage.getItem("10haath_api_base") || API_BASE_DEFAULT;
      const LOG_MODE = "PATCH"; // PATCH or POST
      const LOG_TAB = "Scanner_Logs";

      const params = new URLSearchParams(window.location.search);
      const custId = params.get("id");
      const tab = params.get("type");

      const identityHeading = document.getElementById("identityHeading");
      const identitySub = document.getElementById("identitySub");
      const statusText = document.getElementById("statusText");
      const saviorCard = document.getElementById("saviorCard");
      const ownerCard = document.getElementById("ownerCard");
      const verifyBtn = document.getElementById("verifyBtn");
      const logbook = document.getElementById("logbook");
      const logSubmit = document.getElementById("logSubmit");
      const pinCheck = document.getElementById("pinCheck");
      const sosButtons = document.getElementById("sosButtons");
      const serviceCard = document.getElementById("serviceCard");
      const docCard = document.getElementById("docCard");

      let record = null;

      function sanitizePhone(value) {
        return String(value || "").replace(/\D/g, "");
      }

      function buildWhatsAppUrl(phone, text) {
        const base = phone ? `https://wa.me/${phone}` : "https://wa.me/";
        return `${base}?text=${encodeURIComponent(text)}`;
      }

      function buildMailto(email, subject, body) {
        return `mailto:${encodeURIComponent(email)}?subject=${encodeURIComponent(
          subject
        )}&body=${encodeURIComponent(body)}`;
      }

      function idField() {
        return tab === "P00_Human" || tab === "P00_Value" ? "Cust_ID(No.)" : "Cust_ID";
      }

      function humanTimestamp() {
        return new Date().toLocaleString("en-IN", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      async function sheetdbPatchById(sheetName, idValue, payload) {
        const field = idField();
        const pathUrl = `${API_BASE}/${sheetName}/${encodeURIComponent(
          field
        )}/${encodeURIComponent(idValue)}`;
        let res = await fetch(pathUrl, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (res.ok || res.status !== 404) {
          return res;
        }
        const params = new URLSearchParams();
        params.set("sheet", sheetName);
        params.set(field, idValue);
        const queryUrl = `${API_BASE}?${params.toString()}`;
        res = await fetch(queryUrl, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        return res;
      }

      async function sheetdbSearchById(sheetName, idValue) {
        const field = idField();
        const params1 = new URLSearchParams();
        params1.set(field, idValue);
        const url1 = `${API_BASE}/${sheetName}/search?${params1.toString()}`;
        let res = await fetch(url1);
        if (!res.ok) {
          const params2 = new URLSearchParams();
          params2.set("sheet", sheetName);
          params2.set(field, idValue);
          const url2 = `${API_BASE}/search?${params2.toString()}`;
          res = await fetch(url2);
        }
        if (!res.ok) return { ok: false, rows: [] };
        const rows = await res.json();
        return { ok: true, rows };
      }

      async function saveLiveLocation(sheetName, idValue, liveLink, rec) {
        const payload = {
          Timestamp: humanTimestamp(),
          "Liv location": liveLink,
        };

        // 1) Try normal PATCH
        let res = await sheetdbPatchById(sheetName, idValue, payload);
        if (res.ok) return { ok: true, mode: "patch", status: res.status };

        // 2) Try search for row id, then patch by id
        const field = idField();
        const searchResult = await sheetdbSearchById(sheetName, idValue);
        if (searchResult.ok) {
          const rowId = searchResult.rows?.[0]?.id || searchResult.rows?.[0]?.row_id;
          if (rowId) {
            const byIdUrl = `${API_BASE}/${sheetName}/id/${encodeURIComponent(
              rowId
            )}`;
            res = await fetch(byIdUrl, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            if (res.ok) return { ok: true, mode: "patch_id", status: res.status };
          }
          // If row exists but no row_id, try query patch again
          res = await sheetdbPatchById(sheetName, idValue, payload);
          if (res.ok) return { ok: true, mode: "patch_query", status: res.status };
        }

        // 3) Upsert: create a new row with full data if no match
        try {
          const createPayload = {
            Timestamp: payload.Timestamp,
            "Cust_ID(No.)": idValue,
            Person_Name: rec?.Person_Name || "",
            Emergency1: rec?.Emergency1 || "",
            Email1: rec?.Email1 || "",
            Email2: rec?.Email2 || "",
            WACompany: rec?.WACompany || "",
            Owner_PIN: rec?.Owner_PIN || "",
            Dikkat: "",
            "ScannerNo.": "",
            "Liv location": liveLink,
          };
          await fetch(`${API_BASE}/${sheetName}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(createPayload),
          });
          return { ok: true, mode: "insert", status: 201 };
        } catch (e) {
          return { ok: false, mode: "fail", status: 0 };
        }
      }

      async function createSosImage(text) {
        const canvas = document.createElement("canvas");
        const width = 900;
        const padding = 40;
        const lines = text.split("\n");
        const lineHeight = 40;
        const height = padding * 2 + lines.length * lineHeight + 120;
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#fff6e8";
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = "#c23b22";
        ctx.font = "bold 42px Space Grotesk, sans-serif";
        ctx.fillText("10haath SOS", padding, padding + 40);
        ctx.fillStyle = "#1b1b1b";
        ctx.font = "28px Space Grotesk, sans-serif";
        lines.forEach((line, idx) => {
          ctx.fillText(line, padding, padding + 90 + idx * lineHeight);
        });
        const blob = await new Promise((resolve) =>
          canvas.toBlob(resolve, "image/png")
        );
        return new File([blob], "10haath-sos.png", { type: "image/png" });
      }

      async function getGpsLink() {
        return new Promise((resolve) => {
          if (!navigator.geolocation) {
            resolve("Location not available");
            return;
          }
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              const { latitude, longitude } = pos.coords;
              resolve(`https://maps.google.com/?q=${latitude},${longitude}`);
            },
            () => resolve("Location not available"),
            { enableHighAccuracy: true, timeout: 8000 }
          );
        });
      }

      async function fetchRecord() {
        if (!custId || !tab) {
          statusText.textContent = "Missing QR parameters.";
          identityHeading.textContent = "Invalid QR";
          return;
        }

        if (!API_BASE || API_BASE.includes("REPLACE_ME")) {
          statusText.textContent = "SheetDB API Base is not configured.";
          identityHeading.textContent = "Config missing";
          return;
        }

        const primaryUrl = `${API_BASE}/${tab}/search?${encodeURIComponent(
          idField()
        )}=${encodeURIComponent(custId)}`;
        const altUrl = `${API_BASE}/search?sheet=${encodeURIComponent(
          tab
        )}&${encodeURIComponent(idField())}=${encodeURIComponent(custId)}`;

        let res = await fetch(primaryUrl);
        if (!res.ok && res.status === 404) {
          res = await fetch(altUrl);
        }
        if (!res.ok) {
          statusText.textContent = `Unable to fetch record (${res.status}). Check QR or API.`;
          identityHeading.textContent = "Record not found";
          return;
        }

        const data = await res.json();
        record = data[0];

        if (!record) {
          statusText.textContent = "No record found.";
          identityHeading.textContent = "Record not found";
          return;
        }

        const identity =
          record.Person_Name || record.Gadi_Number || record.Name || "10haath";
        identityHeading.textContent = identity;
        if (tab === "P00_Human" || tab === "P00_Value") {
          identitySub.textContent = "";
        } else {
          identitySub.textContent = `Type: ${tab}`;
        }
        statusText.textContent = "Secure record loaded.";

        routeByTab();
      }

      function routeByTab() {
        const isCat1 = tab === "P00_Human";
        const isCat2 = tab === "P00_Value";
        const isCat3 = tab.startsWith("P0") && !isCat1 && !isCat2 && tab !== "P13_Doc";
        const isCat4 = tab === "P13_Doc";

        if (isCat1 || isCat2) {
          renderSafety(isCat1);
          return;
        }

        saviorCard.classList.add("hidden");
        ownerCard.classList.add("hidden");

        if (isCat3) {
          renderService();
        }

        if (isCat4) {
          renderDocVault();
        }
      }

      function renderSafety(isCat1) {
        if (!isCat1) {
          ownerCard.classList.add("hidden");
        }

        const email1 = record.Email1 || record.Email || "";
        const email2 = record.Email2 || "";
        if (email1 || email2) {
          const emailWrap = document.createElement("div");
          emailWrap.style.marginTop = "12px";
          const subject = "10haath Alert";
          const identity = record.Person_Name || record.Gadi_Number || record.Name || "10haath";
          const body = `10haath Alert: I am verifying recovery for ${identity}. Please check.`;
          if (email1) {
            const btn1 = document.createElement("a");
            btn1.className = "btn secondary";
            btn1.textContent = "EMAIL OWNER 1";
            btn1.href = buildMailto(email1, subject, body);
            emailWrap.appendChild(btn1);
          }
          if (email2) {
            const btn2 = document.createElement("a");
            btn2.className = "btn secondary";
            btn2.style.marginLeft = "10px";
            btn2.textContent = "EMAIL OWNER 2";
            btn2.href = buildMailto(email2, subject, body);
            emailWrap.appendChild(btn2);
          }
          saviorCard.appendChild(emailWrap);
        }

        verifyBtn.addEventListener("click", () => {
          const identity = record.Person_Name || record.Gadi_Number || record.Name || "10haath";
          const msg = `10haath Alert: I am verifying recovery for ${identity}. Please check.`;
          const waCompany = sanitizePhone(record.WACompany);
          window.open(buildWhatsAppUrl(waCompany, msg), "_blank");
          logbook.classList.remove("hidden");
        });

        logSubmit.addEventListener("click", async () => {
          const payload = {
            ScannerNo: document.getElementById("scannerNo").value || "",
            Dikkat: document.getElementById("dikkat").value || "",
          };
          if (LOG_MODE === "POST") {
            payload.Cust_ID = custId;
            payload.Type = tab;
            payload.Timestamp = new Date().toISOString();
            await fetch(`${API_BASE}/${LOG_TAB}`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
          } else {
            await sheetdbPatchById(tab, custId, payload);
          }
          statusText.textContent = "Logbook updated.";
        });

        if (isCat1) {
          pinCheck.addEventListener("click", async () => {
            const pin = document.getElementById("pinInput").value || "";
            if (pin !== String(record.Owner_PIN || "")) {
              statusText.textContent = "Incorrect PIN.";
              return;
            }
            statusText.textContent = "PIN verified. Opening SOS flow...";
            const identity = record.Person_Name || record.Gadi_Number || record.Name || "10haath";
            const sessionId = `${Date.now().toString(36)}-${Math.random()
              .toString(36)
              .slice(2, 10)}`;
            const liveLink = `${window.location.origin}${window.location.pathname.replace(
              "scanner.html",
              ""
            )}live-track.html?mode=view&session=${encodeURIComponent(sessionId)}`;
            const baseText = `10haath SOS: Immediate help needed for ${identity}. Live location: ${liveLink}`;

            const nextUrl = `${window.location.origin}${window.location.pathname.replace(
              "scanner.html",
              ""
            )}sos-confirm.html?id=${encodeURIComponent(
              custId
            )}&type=${encodeURIComponent(tab)}&live=${encodeURIComponent(
              liveLink
            )}&msg=${encodeURIComponent(baseText)}&session=${encodeURIComponent(
              sessionId
            )}`;
            window.location.href = nextUrl;
            // Video call button removed as requested
          });
        }
      }

      function renderService() {
        serviceCard.classList.remove("hidden");
        serviceCard.innerHTML = `<h2>Smart Service</h2>`;

        const addInfo = (label, value) => {
          const div = document.createElement("div");
          div.style.marginTop = "10px";
          div.innerHTML = `<span class="mono">${label}:</span> ${value || "-"}`;
          serviceCard.appendChild(div);
        };

        if (tab === "P01_Pay") {
          addInfo("Name", record.Name);
          addInfo("UPI", record.UPI_ID);
          const btn = document.createElement("button");
          btn.className = "btn";
          btn.textContent = "Pay Now";
          btn.addEventListener("click", () => {
            const url = `upi://pay?pa=${encodeURIComponent(
              record.UPI_ID || ""
            )}&pn=${encodeURIComponent(record.Name || "")}&cu=INR`;
            window.location.href = url;
          });
          serviceCard.appendChild(btn);
          return;
        }

        if (tab === "P03_Biz") {
          addInfo("Name", record.Name);
          addInfo("Job", record.Job);
          addInfo("Phone", record.Phone);
          addInfo("Email", record.Email);
          addInfo("Instagram", record.Instagram);
          addInfo("LinkedIn", record.LinkedIn);
          addInfo("Website", record.Website);
          const btn = document.createElement("button");
          btn.className = "btn";
          btn.textContent = "Save Contact (.vcf)";
          btn.addEventListener("click", () => {
            const vcard = [
              "BEGIN:VCARD",
              "VERSION:3.0",
              `FN:${record.Name || ""}`,
              `TEL:${record.Phone || ""}`,
              `EMAIL:${record.Email || ""}`,
              `TITLE:${record.Job || ""}`,
              `URL:${record.Website || ""}`,
              "END:VCARD",
            ].join("\n");
            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `${record.Name || "contact"}.vcf`;
            a.click();
            URL.revokeObjectURL(url);
          });
          serviceCard.appendChild(btn);
          return;
        }

        if (tab === "P04_Review") {
          addInfo("Business", record.Business_Name);
          const btn = document.createElement("button");
          btn.className = "btn";
          btn.textContent = "Leave Review";
          btn.addEventListener("click", () => {
            window.location.href = record.Review_URL || "#";
          });
          serviceCard.appendChild(btn);
          return;
        }

        if (tab === "P08_Resume") {
          addInfo("Name", record.Name);
          const btn = document.createElement("button");
          btn.className = "btn";
          btn.textContent = "Open Resume";
          btn.addEventListener("click", () => {
            window.location.href = record.Resume_Link || "#";
          });
          serviceCard.appendChild(btn);
          return;
        }

        if (tab === "P09_WiFi") {
          addInfo("SSID", record.SSID);
          const security = record.Security || "WPA";
          const wifiString = `WIFI:S:${record.SSID || ""};T:${security};P:${record.Password || ""};;`;
          const btn = document.createElement("button");
          btn.className = "btn";
          btn.textContent = "Connect to WiFi";
          btn.addEventListener("click", () => {
            navigator.clipboard.writeText(wifiString);
            alert("WiFi string copied. Use your phone's WiFi QR option.");
          });
          serviceCard.appendChild(btn);
          addInfo("WiFi String", wifiString);
          return;
        }

        if (tab === "P11_Challan") {
          addInfo("Vehicle No", record.Vehicle_No);
          const btn = document.createElement("button");
          btn.className = "btn";
          btn.textContent = "Open e-Challan";
          btn.addEventListener("click", () => {
            const url = `https://echallan.parivahan.gov.in/index/accused-challan?vehicleNo=${encodeURIComponent(
              record.Vehicle_No || ""
            )}`;
            window.location.href = url;
          });
          serviceCard.appendChild(btn);
          return;
        }

        if (tab === "P12_Invite") {
          const pinWrap = document.createElement("div");
          pinWrap.innerHTML = `
            <label for="invitePin">Invite PIN</label>
            <input id="invitePin" type="password" placeholder="Enter PIN" />
            <button class="btn" id="inviteUnlock" style="margin-top:10px;">Unlock Invite</button>
          `;
          serviceCard.appendChild(pinWrap);
          pinWrap.querySelector("#inviteUnlock").addEventListener("click", () => {
            const pin = pinWrap.querySelector("#invitePin").value || "";
            if (pin !== String(record.PIN || "")) {
              statusText.textContent = "Incorrect invite PIN.";
              return;
            }
            statusText.textContent = "Invite unlocked.";
            addInfo("Event", record.Event_Name);
            addInfo("Date", record.Date);
            const mapsBtn = document.createElement("button");
            mapsBtn.className = "btn";
            mapsBtn.textContent = "Open Maps";
            mapsBtn.addEventListener("click", () => {
              window.location.href = record.Maps_Link || "#";
            });
            const videoBtn = document.createElement("button");
            videoBtn.className = "btn secondary";
            videoBtn.textContent = "Open Video";
            videoBtn.addEventListener("click", () => {
              window.location.href = record.Video_Link || "#";
            });
            serviceCard.appendChild(mapsBtn);
            serviceCard.appendChild(videoBtn);
          });
          return;
        }
      }

      function renderDocVault() {
        docCard.classList.remove("hidden");
        docCard.innerHTML = `
          <h2>Document Vault</h2>
          <div class="timer" id="vaultTimer">20:00</div>
          <div style="margin-top:12px;">
            <button class="btn" id="requestAccess">Request Document Access</button>
          </div>
          <div style="margin-top:12px;">
            <label for="docPassword">PDF Password</label>
            <input id="docPassword" type="password" placeholder="Enter password" />
          </div>
          <div style="margin-top:12px;">
            <button class="btn secondary" id="openDrive">Access Drive</button>
          </div>
        `;

        const start = Date.now();
        const duration = 20 * 60 * 1000;
        const timerEl = document.getElementById("vaultTimer");
        const interval = setInterval(() => {
          const remaining = duration - (Date.now() - start);
          if (remaining <= 0) {
            clearInterval(interval);
            timerEl.textContent = "00:00";
            docCard.innerHTML = "<h2>Session Expired</h2><p>Access window closed.</p>";
            return;
          }
          const mins = String(Math.floor(remaining / 60000)).padStart(2, "0");
          const secs = String(Math.floor((remaining % 60000) / 1000)).padStart(2, "0");
          timerEl.textContent = `${mins}:${secs}`;
        }, 1000);

        document.getElementById("requestAccess").addEventListener("click", () => {
          window.open(record.Drive_Link || "#", "_blank");
        });

        document.getElementById("openDrive").addEventListener("click", () => {
          const entered = document.getElementById("docPassword").value || "";
          if (entered !== String(record.Drive_Password || "")) {
            statusText.textContent = "Incorrect document password.";
            return;
          }
          window.open(record.Password_Free_PDF_Link || record.Drive_Link || "#", "_blank");
        });
      }

      fetchRecord();
