<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>10haath Scanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1b1b1b;
        --muted: #5b5b5b;
        --paper: #f7f3ea;
        --accent: #0f7a6d;
        --accent-2: #d9822b;
        --danger: #c23b22;
        --card: #ffffff;
        --border: #e2d8c5;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: "Space Grotesk", system-ui, sans-serif; color: var(--ink); background: #12233f; }
      .wrap { max-width: 980px; margin: 0 auto; padding: 28px 18px 80px; }
      header { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
      h1 { margin: 0; font-size: 28px; color: #fff; }
      .subtitle { color: #d8d8d8; font-size: 14px; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 18px; box-shadow: var(--shadow); margin-bottom: 16px; }
      .panel-card { max-width: 520px; margin: 0 auto 16px; }
      .tabs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; background: #f1f1f1; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
      .tab-btn { border: none; background: transparent; padding: 12px 10px; font-weight: 700; cursor: pointer; color: #4b4b4b; }
      .tab-btn.active { background: #1f3558; color: #fff; }
      .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
      .btn { border: none; padding: 12px 18px; border-radius: 12px; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; }
      .btn.secondary { background: var(--accent-2); }
      .btn.danger { background: var(--danger); }
      label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; color: var(--muted); margin-bottom: 6px; }
      input, textarea, select { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border); font-family: inherit; font-size: 14px; }
      textarea { min-height: 90px; }
      .mono { font-family: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace; }
      .hidden { display: none; }
      .timer { font-size: 22px; font-weight: 700; color: var(--danger); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1 id="identityHeading">Loading...</h1>
        <div class="subtitle" id="identitySub"></div>
        <div class="subtitle mono">Build: 2026-03-13 13:30 IST</div>
        <div class="subtitle" style="color:#ffb27a; font-weight:600;">QRDOCTOR STYLE TABS ACTIVE</div>
      </header>

      <section class="card" id="statusCard">
        <div class="subtitle" id="statusText">Fetching secure record...</div>
      </section>

      <section class="card panel-card" id="flowPanel">
        <div class="tabs" id="flowTabs">
          <button class="tab-btn active" data-tab="savior">Savior</button>
          <button class="tab-btn" data-tab="owner">Owner</button>
        </div>

        <section id="saviorCard">
          <h2>Step 1: Savior Verification</h2>
          <button class="btn" id="verifyBtn">VERIFY VIA WHATSAPP</button>

          <div id="logbook" class="hidden" style="margin-top: 14px;">
            <div class="row">
              <div>
                <label for="scannerNo">Scanner Mobile</label>
                <input id="scannerNo" placeholder="Scanner mobile number" />
              </div>
              <div>
                <label for="dikkat">Problem / Situation</label>
                <textarea id="dikkat" placeholder="Describe the issue"></textarea>
              </div>
            </div>
            <div style="margin-top: 12px;">
              <button class="btn secondary" id="logSubmit">FINAL SUBMIT</button>
            </div>
          </div>
        </section>

        <section id="ownerCard" class="hidden">
          <h2>Step 2: Owner SOS</h2>
          <div class="row">
            <div>
              <label for="pinInput">Security PIN</label>
              <input id="pinInput" type="password" placeholder="Enter owner PIN" />
            </div>
            <div style="display: flex; align-items: flex-end;">
              <button class="btn" id="pinCheck">Unlock SOS</button>
            </div>
          </div>
          <div id="sosButtons" class="hidden" style="margin-top: 14px;"></div>
        </section>
      </section>

      <section class="card hidden" id="serviceCard"></section>
      <section class="card hidden" id="docCard"></section>
    </div>

    <script>
      const API_BASE_DEFAULT = "https://sheetdb.io/api/v1/vpozwh7cptzc4";
      const API_BASE = localStorage.getItem("10haath_api_base") || API_BASE_DEFAULT;

      const params = new URLSearchParams(window.location.search);
      const tab = params.get("t") || params.get("type") || "";
      const qName = params.get("n") || "";
      const qWa = params.get("w") || "";
      const qSecret = params.get("s") || "";
      const urlId = params.get("id") || "";

      const identityHeading = document.getElementById("identityHeading");
      const identitySub = document.getElementById("identitySub");
      const statusText = document.getElementById("statusText");
      const saviorCard = document.getElementById("saviorCard");
      const ownerCard = document.getElementById("ownerCard");
      const verifyBtn = document.getElementById("verifyBtn");
      const logbook = document.getElementById("logbook");
      const logSubmit = document.getElementById("logSubmit");
      const pinCheck = document.getElementById("pinCheck");
      const sosButtons = document.getElementById("sosButtons");
      const serviceCard = document.getElementById("serviceCard");
      const docCard = document.getElementById("docCard");
      const flowTabs = document.getElementById("flowTabs");

      let record = null;
      let embeddedId = "";

      function sanitizePhone(value) { return String(value || "").replace(/\D/g, ""); }
      function buildWhatsAppUrl(phone, text) {
        const base = phone ? `https://wa.me/${phone}` : "https://wa.me/";
        return `${base}?text=${encodeURIComponent(text)}`;
      }
      function decodeSecret(encoded) {
        if (!encoded) return null;
        try {
          let b64 = encoded.replace(/-/g, "+").replace(/_/g, "/");
          const pad = b64.length % 4;
          if (pad) b64 += "=".repeat(4 - pad);
          const json = decodeURIComponent(escape(atob(b64)));
          return JSON.parse(json);
        } catch (e) { return null; }
      }
      function humanTimestamp() {
        return new Date().toLocaleString("en-IN", {
          year: "numeric", month: "2-digit", day: "2-digit",
          hour: "2-digit", minute: "2-digit", second: "2-digit",
        });
      }
      async function getGpsLink() {
        return new Promise((resolve) => {
          if (!navigator.geolocation) { resolve("Location not available"); return; }
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              const { latitude, longitude } = pos.coords;
              resolve(`https://maps.google.com/?q=${latitude},${longitude}`);
            },
            () => resolve("Location not available"),
            { enableHighAccuracy: true, timeout: 8000 }
          );
        });
      }
      async function sheetdbPatchById(sheetName, idValue, payload) {
        const field = sheetName === "P00_Human" || sheetName === "P00_Value" ? "Cust_ID(No.)" : "Cust_ID";
        const pathUrl = `${API_BASE}/${sheetName}/${encodeURIComponent(field)}/${encodeURIComponent(idValue)}`;
        const patchWithBody = (url, body) =>
          fetch(url, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
        const putWithBody = (url, body) =>
          fetch(url, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });

        let res = await patchWithBody(pathUrl, payload);
        if (!res.ok) {
          res = await patchWithBody(pathUrl, { data: payload });
        }
        if (res.ok) return res;
        if (res.status !== 404) {
          // Some SheetDB projects block PATCH; try PUT fallback.
          let putRes = await putWithBody(pathUrl, payload);
          if (!putRes.ok) {
            putRes = await putWithBody(pathUrl, { data: payload });
          }
          return putRes;
        }
        const params = new URLSearchParams();
        params.set("sheet", sheetName);
        params.set(field, idValue);
        const queryUrl = `${API_BASE}?${params.toString()}`;
        res = await patchWithBody(queryUrl, payload);
        if (!res.ok) {
          res = await patchWithBody(queryUrl, { data: payload });
        }
        if (!res.ok) {
          res = await putWithBody(queryUrl, payload);
          if (!res.ok) {
            res = await putWithBody(queryUrl, { data: payload });
          }
        }
        return res;
      }
      async function saveLiveLocation(sheetName, idValue, liveLink, rec) {
        if (!idValue) return { ok: false, mode: "missing_id" };
        const payload = { Timestamp: humanTimestamp(), "Liv location": liveLink };
        let res = await sheetdbPatchById(sheetName, idValue, payload);
        if (res.ok) return { ok: true, mode: "patch", status: res.status };
        try {
          const createPayload = {
            Timestamp: payload.Timestamp,
            "Cust_ID(No.)": sheetName === "P00_Human" || sheetName === "P00_Value" ? idValue : "",
            Cust_ID: sheetName !== "P00_Human" && sheetName !== "P00_Value" ? idValue : "",
            Person_Name: rec?.Person_Name || "",
            Emergency1: rec?.Emergency1 || "",
            Email1: rec?.Email1 || "",
            Email2: rec?.Email2 || "",
            WACompany: rec?.WACompany || "",
            Owner_PIN: rec?.Owner_PIN || "",
            Dikkat: "",
            "ScannerNo.": "",
            "Liv location": liveLink,
          };
          const postWithBody = (body) =>
            fetch(`${API_BASE}/${sheetName}`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
          let postRes = await postWithBody(createPayload);
          if (!postRes.ok) {
            postRes = await postWithBody({ data: createPayload });
          }
          return { ok: true, mode: "insert", status: 201 };
        } catch (e) { return { ok: false, mode: "fail" }; }
      }

      async function fetchRecord() {
        if (qName || qSecret || qWa) {
          const sec = decodeSecret(qSecret) || {};
          embeddedId = sec.c || urlId || "";
          record = {
            Person_Name: qName || "10haath",
            Emergency1: sec.e || "",
            Owner_PIN: sec.p || "",
            WACompany: qWa || "",
          };
          statusText.textContent = "Secure record loaded.";
          identityHeading.textContent = record.Person_Name || "10haath";
          identitySub.textContent = "";
          routeByTab();
          return;
        }
        statusText.textContent = "Missing QR parameters.";
        identityHeading.textContent = "Invalid QR";
      }

      function setupTabs() {
        const buttons = flowTabs.querySelectorAll(".tab-btn");
        const showTab = (tabName) => {
          if (tabName === "savior") { saviorCard.classList.remove("hidden"); ownerCard.classList.add("hidden"); }
          else { ownerCard.classList.remove("hidden"); saviorCard.classList.add("hidden"); }
          buttons.forEach((btn) => btn.classList.toggle("active", btn.dataset.tab === tabName));
        };
        buttons.forEach((btn) => btn.addEventListener("click", () => showTab(btn.dataset.tab)));
        showTab("savior");
      }

      function renderSafety(isCat1) {
        if (!isCat1) ownerCard.classList.add("hidden");
        setupTabs();

        verifyBtn.addEventListener("click", () => {
          const identity = record.Person_Name || "10haath";
          const msg = `10haath Alert: I am verifying recovery for ${identity}. Please check.`;
          const waCompany = sanitizePhone(record.WACompany);
          window.open(buildWhatsAppUrl(waCompany, msg), "_blank");
          logbook.classList.remove("hidden");
        });

        logSubmit.addEventListener("click", async () => {
          const payload = {
            "ScannerNo.": document.getElementById("scannerNo").value || "",
            Dikkat: document.getElementById("dikkat").value || "",
          };
          if (embeddedId && tab) await sheetdbPatchById(tab, embeddedId, payload);
          statusText.textContent = "Logbook updated.";
        });

        if (isCat1) {
          pinCheck.addEventListener("click", async () => {
            const pin = document.getElementById("pinInput").value || "";
            if (pin !== String(record.Owner_PIN || "")) { statusText.textContent = "Incorrect PIN."; return; }
            statusText.textContent = "Getting live location...";
            const identity = record.Person_Name || "10haath";
            const linkValue = await getGpsLink();

            sosButtons.innerHTML = "";
            sosButtons.classList.remove("hidden");

            const confirmWrap = document.createElement("div");
            confirmWrap.className = "row";
            confirmWrap.style.marginTop = "10px";
            confirmWrap.innerHTML = `
              <div>
                <label>Live Location Link</label>
                <input type="text" id="liveLinkBox" value="${linkValue}" readonly />
                <button class="btn secondary" id="copyLink" style="margin-top:8px;">COPY LINK</button>
              </div>
              <div>
                <label>Confirm Link (Paste Here)</label>
                <input type="text" id="confirmLink" placeholder="Paste link here" />
                <button class="btn danger" id="confirmLive" style="margin-top:8px;">CONFIRM & SAVE</button>
              </div>
            `;
            sosButtons.appendChild(confirmWrap);

            confirmWrap.querySelector("#copyLink").addEventListener("click", async () => {
              try { await navigator.clipboard.writeText(linkValue); statusText.textContent = "Live link copied."; }
              catch (e) { statusText.textContent = "Copy failed. Long-press to copy."; }
            });

            confirmWrap.querySelector("#confirmLive").addEventListener("click", async () => {
              const entered = confirmWrap.querySelector("#confirmLink").value.trim();
              if (entered !== linkValue) { statusText.textContent = "Please paste the exact live link to confirm."; return; }
              if (!embeddedId) { statusText.textContent = "Owner code missing in QR. Cannot save location."; return; }

              const saveTab = tab || "P00_Human";
              const saveResult = await saveLiveLocation(saveTab, embeddedId, linkValue, record);
              if (!saveResult.ok) { statusText.textContent = "Live location not saved. Check SheetDB."; return; }
              statusText.textContent = "Live location saved.";

              const dropdownWrap = document.createElement("div");
              dropdownWrap.style.marginTop = "10px";
              dropdownWrap.innerHTML = `
                <label>Send Message</label>
                <select id="sendConfirm">
                  <option value="">Choose...</option>
                  <option value="ok">OK</option>
                </select>
              `;
              sosButtons.appendChild(dropdownWrap);

              dropdownWrap.querySelector("#sendConfirm").addEventListener("change", (e) => {
                if (e.target.value === "ok") {
                  const e1 = sanitizePhone(record.Emergency1);
                  const msg = `10haath SOS: Immediate help needed for ${identity}. Live location: ${linkValue}`;
                  window.open(buildWhatsAppUrl(e1, msg), "_blank");
                }
              });
            });
          });
        }
      }

      function routeByTab() {
        const isCat1 = tab === "P00_Human";
        const isCat2 = tab === "P00_Value";
        const isCat3 = tab.startsWith("P0") && !isCat1 && !isCat2 && tab !== "P13_Doc";
        const isCat4 = tab === "P13_Doc";

        if (isCat1 || isCat2) { flowTabs.classList.remove("hidden"); renderSafety(isCat1); return; }

        saviorCard.classList.add("hidden");
        ownerCard.classList.add("hidden");
        flowTabs.classList.add("hidden");

        if (isCat3) renderService();
        if (isCat4) renderDocVault();
      }

      function renderService() {
        serviceCard.classList.remove("hidden");
        serviceCard.innerHTML = `<h2>Smart Service</h2><p>Service flow not enabled in QR-only mode.</p>`;
      }

      function renderDocVault() {
        docCard.classList.remove("hidden");
        docCard.innerHTML = `<h2>Document Vault</h2><p>Doc vault requires SheetDB mode.</p>`;
      }

      fetchRecord();
    </script>
  </body>
</html>
