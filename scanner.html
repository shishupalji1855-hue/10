<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10haath Smart Security Scanner</title>
    <style>
        :root { --red: #e63946; --blue: #1d3557; --green: #25D366; --gray: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--blue); margin: 0; padding: 15px; text-align: center; color: white; -webkit-user-select: none; user-select: none; }
        .card { background: white; color: #333; padding: 25px; border-radius: 20px; max-width: 450px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .btn { display: block; width: 100%; padding: 15px; margin: 12px 0; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 16px; transition: 0.3s; box-sizing: border-box; }
        .btn-wa { background: var(--green); }
        .btn-red { background: var(--red); }
        .btn-blue { background: var(--blue); }
        .btn-group-call { background: #075E54; border: 2px solid #128C7E; animation: pulse 2s infinite; }
        input, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; text-align: center; }
        .timer { font-size: 32px; font-weight: bold; color: var(--red); margin: 15px 0; }
        .hidden { display: none; }
        .owner-box { background: #f0f4f8; border: 1px solid #d1d9e6; padding: 15px; border-radius: 15px; margin-top: 15px; color: #333; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.03);} 100% {transform: scale(1);} }
        h2 { color: var(--red); margin-top: 0; }
        p { color: #555; font-size: 14px; line-height: 1.4; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="card">
        <h2 id="status">Verifying QR Security...</h2>
        <div id="workflow-area"></div>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const cid = params.get('id');
    const type = params.get('type');
    const API_BASE = "https://sheetdb.io/api/v1/vpozwh7cptzc4";

    if (cid && type) {
        fetch(`${API_BASE}?sheet=${type}`)
        .then(res => res.json())
        .then(data => {
            const foundData = data.find(row => 
                String(row["Cust_ID(No.)"]).trim() === String(cid).trim()
            );
            if (foundData) { startApp(foundData); } 
            else { document.getElementById('status').innerText = "Error: ID " + cid + " active nahi hai."; }
        })
        .catch(err => { document.getElementById('status').innerText = "Server Error!"; });
    }
function startApp(d) {
        document.getElementById('status').classList.add('hidden');
        const area = document.getElementById('workflow-area');

        if (type === 'P00_Human' || type === 'P00_Value') {
            area.innerHTML = `
                <div style="font-size: 3rem;">🚨</div>
                <h2>Alert: ${d.Person_Name}</h2>
                
                <button class="btn btn-wa" onclick="sendInitialAlert('${d.WACompany}', '${d.Person_Name}')">1. Notify Owner via WhatsApp</button>
                
                <div id="helperArea" class="hidden" style="background:#f9f9f9; padding:15px; border-radius:15px; border:1px solid #ddd; margin-top:10px;">
                    <p style="text-align:left; color:#333; font-weight:bold;">Public Helper Info (Wapas aane par bharein):</p>
                    <input type="number" id="scNo" placeholder="Your WhatsApp Number">
                    <textarea id="scDk" placeholder="How can you help? (e.g. Bag found at Metro)"></textarea>
                    <button class="btn btn-red" onclick="saveScannerLog('${cid}', '${d.Person_Name}')">Save Record to Logs</button>
                </div>

                <hr style="margin:20px 0;">

                <div class="owner-box">
                    <p style="margin:0 0 10px 0;"><b>Step 2: Owner Security PIN</b></p>
                    <input type="password" id="oPin" placeholder="Enter Security PIN">
                    <button class="btn btn-blue" onclick="handleSOS('${d.Owner_PIN}', '${d.Person_Name}', '${d.Emergency1}', '${d.Emergency2}', '${d.Emergency3}')">Verify PIN & Share GPS</button>
                </div>

                <div id="sosAction" class="hidden">
                    <p style="color:var(--green); font-weight:bold; margin-top:10px;">✅ SOS & GPS Sent to 3 Numbers!</p>
                    <button class="btn btn-group-call" onclick="startEmergencyCall('${d.Emergency1}', '${d.Emergency2}', '${d.Emergency3}')">📞 START GROUP VIDEO CALL</button>
                </div>
            `;
        } 
        else if (type === 'P13_Doc') {
            area.innerHTML = `
                <h2>QRDoctor Vault</h2>
                <div class="timer" id="timeLeft">20:00</div>
                <button class="btn btn-red" onclick="openVaultLink('${d.Drive_Link}')">VIEW DOCUMENTS</button>
            `;
        }
        else if (type === 'P01_Pay') window.location.href = `upi://pay?pa=${d.UPI_ID}&pn=${encodeURIComponent(d.Name)}&cu=INR`;
        else if (d.Review_URL) window.location.href = d.Review_URL;
    }
function sendInitialAlert(phone, name) {
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent('🚨 10haath Alert: Someone scanned the QR for ' + name)}`, '_blank');
        // Back-to-show logic: 1.5s baad form reveal
        setTimeout(() => {
            document.getElementById('helperArea').classList.remove('hidden');
        }, 1500); 
    }

    function handleSOS(correctPin, name, e1, e2, e3) {
        const entered = document.getElementById('oPin').value;
        if(entered !== correctPin) return alert("Galat PIN!");

        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude, lng = pos.coords.longitude;
            const maps = `https://www.google.com/maps?q=${lat},${lng}`;
            const msg = encodeURIComponent(`🚨 SOS EMERGENCY!\nName: ${name}\nLive Location: ${maps}`);
            
            // Triple WhatsApp Alert
            [e1, e2, e3].forEach((num, index) => {
                if(num && num !== "null" && num !== "") {
                    setTimeout(() => {
                        window.open(`https://wa.me/${num}?text=${msg}`, '_blank');
                    }, index * 2000); 
                }
            });
            document.getElementById('sosAction').classList.remove('hidden');
        }, () => alert("GPS Permission Needed"), {enableHighAccuracy: true});
    }

    function startEmergencyCall(e1, e2, e3) {
        alert("WhatsApp Group Call setup ho raha hai...");
        window.location.href = `https://wa.me/${e1}?text=INITIATING_EMERGENCY_GROUP_CALL`;
    }

    function saveScannerLog(custId, pName) {
        const sNo = document.getElementById('scNo').value;
        const sDk = document.getElementById('scDk').value;
        if(sNo.length < 10) return alert("Sahi Number daalein.");

        fetch(`${API_BASE}?sheet=Scanner_Logs`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                "Timestamp": new Date().toLocaleString(),
                "Cust_ID(No.)": custId,
                "Person_Name": pName,
                "Scanner_No": sNo,
                "Dikkat": sDk
            })
        }).then(() => {
            alert("Record Saved!");
            location.reload();
        });
    }

    function openVaultLink(url) {
        window.open(url, '_blank');
        let duration = 1200;
        const display = document.getElementById('timeLeft');
        const timer = setInterval(() => {
            duration--;
            let mins = Math.floor(duration/60), secs = duration%60;
            display.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if(duration <= 0) {
                clearInterval(timer);
                document.body.innerHTML = "<h1>Session Expired</h1>";
            }
        }, 1000);
    }
</script>
</body>
</html>
