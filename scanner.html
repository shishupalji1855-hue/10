<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10haath Security Scanner</title>
    <style>
        :root { --red: #e63946; --blue: #1d3557; --green: #25D366; --gray: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--blue); margin: 0; padding: 15px; text-align: center; color: white; -webkit-user-select: none; user-select: none; }
        .card { background: white; color: #333; padding: 25px; border-radius: 20px; max-width: 450px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .btn { display: block; width: 100%; padding: 15px; margin: 12px 0; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 16px; transition: 0.3s; box-sizing: border-box; }
        .btn-wa { background: var(--green); }
        .btn-red { background: var(--red); }
        .btn-blue { background: var(--blue); }
        .btn-sos { background: #075E54; border: 2px solid #128C7E; animation: pulse 2s infinite; }
        input, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; text-align: center; font-size: 14px; }
        .timer { font-size: 32px; font-weight: bold; color: var(--red); margin: 15px 0; border: 2px solid var(--red); display: inline-block; padding: 5px 20px; border-radius: 10px; }
        .hidden { display: none; }
        .sos-box { background: #f0f4f8; border: 2px dashed var(--red); padding: 15px; border-radius: 15px; margin-top: 15px; color: #333; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }
        h2 { color: var(--red); margin: 0 0 10px 0; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="card">
        <h2 id="status">Verifying QR Security...</h2>
        <div id="workflow-area"></div>
    </div>
<script>
    const params = new URLSearchParams(window.location.search);
    const cid = params.get('id'), type = params.get('type');
    const API_BASE = "https://sheetdb.io/api/v1/vpozwh7cptzc4";

    if (cid && type) {
        fetch(`${API_BASE}?sheet=${type}`).then(res => res.json()).then(data => {
            const row = data.find(r => String(r["Cust_ID(No.)"]).trim() === String(cid).trim());
            row ? startApp(row) : document.getElementById('status').innerText = "ID: " + cid + " Not Active";
        }).catch(e => document.getElementById('status').innerText = "Server Error!");
    }

    function startApp(d) {
        document.getElementById('status').classList.add('hidden');
        const area = document.getElementById('workflow-area');
        const identity = d.Person_Name || d.Gadi_Number || d.Name || "Owner";

        // CATEGORY 1 & 2 (SOS & Recovery)
        if (type === 'P00_Human' || type === 'P00_Value') {
            area.innerHTML = `
                <div style="font-size: 3rem;">🚨</div>
                <h2>Alert ID: ${cid}</h2>
                <button class="btn btn-wa" onclick="sendInitialAlert('${d.WACompany}', '${identity}', '${d.Email1}', '${d.Email2}')">1. Notify Owner (WhatsApp & Email)</button>
                <div id="saviorForm" class="hidden">
                    <hr><p><b>Helper Info:</b></p>
                    <input type="number" id="scNo" placeholder="Your Number">
                    <textarea id="scDk" placeholder="Kya dikkat/location hai?"></textarea>
                    <button class="btn btn-red" onclick="saveToLogbook('${cid}', '${identity}')">Final Submit to Records</button>
                </div>
                ${type === 'P00_Human' ? `
                    <div class="sos-box">
                        <p><b>Step 2: Owner PIN (SOS GPS)</b></p>
                        <input type="password" id="oPin" placeholder="Enter Security PIN">
                        <button class="btn btn-blue" onclick="triggerTripleSOS('${d.Owner_PIN}', '${identity}', '${d.Emergency1}', '${d.Emergency2}', '${d.Emergency3}')">Verify & Send Live GPS</button>
                    </div>
                    <div id="sosAction" class="hidden"><button class="btn btn-sos" onclick="window.location.href='https://wa.me/${d.Emergency1}?text=EMERGENCY_VIDEO_CALL'">📞 START VIDEO CALL</button></div>
                ` : ''}`;
        }
        // CATEGORY 3 (Services)
        else if (type === 'P01_Pay') window.location.href = `upi://pay?pa=${d.UPI_ID}&pn=${encodeURIComponent(d.Name)}&cu=INR`;
        else if (type === 'P03_Biz') {
            area.innerHTML = `<h2>💼 ${d.Name}</h2><p>${d.Job}</p><button class="btn btn-blue" onclick="window.location.href='tel:${d.Phone}'">Call ${d.Phone}</button><p>${d.Social_Links}</p>`;
        }
        else if (type === 'P11_Challan') window.location.href = `https://echallan.parivahan.gov.in/index/accused-challan?vehicle_no=${d.Vehicle_No}`;
        else if (type === 'P12_Invite') {
            area.innerHTML = `<h2>💌 Invite</h2><input type="password" id="iPin" placeholder="Enter PIN"><button class="btn btn-blue" onclick="if(document.getElementById('iPin').value=='${d.PIN}'){alert('${d.Event_Name}'); window.location.href='${d.Maps_Link}'}else{alert('Wrong PIN')}">Open Invite</button>`;
        }
        // CATEGORY 4 (Doc Vault)
        else if (type === 'P13_Doc') {
            area.innerHTML = `<h2>📂 Doc Vault</h2><p>Gadi: ${d.Gadi_Number}</p><div class="timer" id="timerDisp">20:00</div><button class="btn btn-red" onclick="startVault('${d.Drive_Link}')">ACCESS DOCUMENTS</button>`;
        }
    }
function sendInitialAlert(phone, identity, e1, e2) {
        // Correct Customized Message
        const msg = encodeURIComponent(`🚨 10haath Alert: I am verifying recovery for ID: ${cid} (${identity})`);
        window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        
        // Show savior form after 2 seconds
        setTimeout(() => { document.getElementById('saviorForm').classList.remove('hidden'); }, 2000);
        
        // Email Alert as backup
        if(e1) window.open(`mailto:${e1}?subject=QR Scanned&body=ID ${cid} scan hua hai.`, '_blank');
    }

    function triggerTripleSOS(correctPin, identity, e1, e2, e3) {
        if(document.getElementById('oPin').value !== correctPin) return alert("Wrong PIN!");

        navigator.geolocation.getCurrentPosition(pos => {
            const loc = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            const msg = encodeURIComponent(`🚨 SOS EMERGENCY!\nID: ${cid}\nName/Gadi: ${identity}\nLive GPS: ${loc}`);
            
            const contacts = [e1, e2, e3];
            contacts.forEach((num, i) => {
                if(num && num !== "null" && num !== "") {
                    // 2.5 second gap taaki teeno ko alag-alag jaye
                    setTimeout(() => { window.open(`https://wa.me/${num}?text=${msg}`, '_blank'); }, i * 2500);
                }
            });
            document.getElementById('sosAction').classList.remove('hidden');
        }, () => alert("Please turn on GPS"), {enableHighAccuracy: true});
    }
function saveToLogbook(custId, name) {
        const p = document.getElementById('scNo').value;
        const d = document.getElementById('scDk').value;
        if(p.length < 10) return alert("Sahi number daalein!");

        fetch(`${API_BASE}?sheet=Scanner_Logs`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                "Timestamp": new Date().toLocaleString(),
                "Cust_ID(No.)": custId,
                "Person_Name": name,
                "Scanner_No": p,
                "Dikkat": d
            })
        }).then(() => {
            alert("Record Saved in Digital Logbook!");
            location.reload();
        });
    }

    function startVault(link) {
        window.open(link, '_blank');
        let t = 1200; // 20 minutes
        const timer = setInterval(() => {
            t--;
            let mins = Math.floor(t/60), secs = t%60;
            document.getElementById('timerDisp').innerText = `${mins}:${secs<10?'0':''}${secs}`;
            if(t <= 0) { clearInterval(timer); document.body.innerHTML = "<h1>Session Expired</h1>"; }
        }, 1000);
    }
</script>
</body>
</html>
