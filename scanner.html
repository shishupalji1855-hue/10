<script>
    const params = new URLSearchParams(window.location.search);
    const cid = params.get('id');
    const type = params.get('type'); // Ab ye direct P00_Human ya P00_Value lega
    const display = document.getElementById('display');

    if(cid && type) {
        // Photo Audit: Column name 'Cust_ID(No.)' exact match
        fetch(`https://sheetdb.io/api/v1/vpozwh7cptzc4/search?Cust_ID(No.)=${cid}&sheet=${type}`)
        .then(res => res.json())
        .then(rows => {
            if(rows.length > 0) {
                renderWorkflow(rows[0], type);
            } else {
                display.innerHTML = "<h2 style='color:red'>Data Not Found</h2><p>ID: " + cid + " not in " + type + "</p>";
            }
        })
        .catch(err => {
            display.innerHTML = "<h2>Connection Error</h2>";
        });
    }

    function renderWorkflow(d, sheet) {
        let h = `<span class="status-tag">Status: Active</span><hr>`;

        // --- CAT 1: HUMAN SAFETY (P00_Human) ---
        if(sheet === 'P00_Human') {
            // Photo Audit: 'Person_Name' aur 'Emergency1'
            h += `<h2>🆘 SOS Alert</h2>
                  <p>In case of emergency with <b>${d.Person_Name || 'this person'}</b>:</p>
                  <button class="btn" style="background:#25D366" onclick="sendWA('${d.Emergency1}', 'Emergency_Alert')">WHATSAPP EMERGENCY CONTACT</button>
                  <hr>
                  <p>Found them? Send location/info below:</p>
                  <input type="text" id="scNo" placeholder="Your Contact Number">
                  <input type="text" id="scDk" placeholder="Current Location/Condition">
                  <button class="btn" style="background:#444" onclick="updateLog('${d['Cust_ID(No.)']}', '${sheet}')">SEND LOG TO FAMILY</button>`;
        } 
        // --- CAT 2: VALUE SAFETY (P00_Value) ---
        else if(sheet === 'P00_Value') {
            // Photo Audit: P00_Value mein 'Email1' (for WA) aur 'Person_Name'
            h += `<h2>🐾 Item/Pet Found</h2>
                  <p>This belongs to <b>${d.Person_Name || 'Valued Customer'}</b></p>
                  <button class="btn" style="background:#25D366" onclick="sendWA('${d.Email1}', 'Found_Your_Item')">MESSAGE OWNER</button>
                  <hr>
                  <p>Update owner about item status:</p>
                  <input type="text" id="scNo" placeholder="Your Phone Number">
                  <input type="text" id="scDk" placeholder="Status (e.g. Found at Park)">
                  <button class="btn" style="background:#444" onclick="updateLog('${d['Cust_ID(No.)']}', '${sheet}')">SEND UPDATE</button>`;
        }

        display.innerHTML = h;
    }

    function updateLog(id, sheet) {
        const no = document.getElementById('scNo').value;
        const dk = document.getElementById('scDk').value;
        if(!no || !dk) return alert("Please fill details!");

        // Photo Audit: 'ScannerNo.' aur 'Dikkat' columns (Note the dot in ScannerNo.)
        fetch(`https://sheetdb.io/api/v1/vpozwh7cptzc4/Cust_ID(No.)/${id}?sheet=${sheet}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                "ScannerNo.": no, 
                "Dikkat": dk, 
                "Timestamp": new Date().toLocaleString() 
            })
        }).then(() => alert("Owner has been notified via Log!"));
    }

    function sendWA(num, msg) {
        window.open(`https://wa.me/${num}?text=10haath_Alert:_${msg}`, '_blank');
    }
</script>
