<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10haath Smart Scanner</title>
    <style>
        :root { --red: #e63946; --blue: #1d3557; --green: #25D366; --gray: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding: 20px; text-align: center; color: #333; }
        .card { background: white; padding: 25px; border-radius: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        .btn { display: block; width: 100%; padding: 15px; margin: 12px 0; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 16px; transition: 0.3s; box-sizing: border-box; }
        .btn-wa { background: var(--green); }
        .btn-red { background: var(--red); }
        .btn-blue { background: var(--blue); }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #fdfdfd; font-size: 14px; }
        .timer { font-size: 28px; font-weight: bold; color: var(--red); margin: 15px 0; }
        .label { font-size: 0.85rem; color: #666; text-align: left; margin-top: 15px; font-weight: bold; }
        .hidden { display: none; }
        .warning-box { margin-top: 15px; padding: 12px; background: #fff4f4; border-radius: 10px; border: 1px solid #ffcccc; text-align: left; font-size: 12px; color: #d63031; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card" id="main-card">
        <h2 id="status">Verifying QR...</h2>
        <div id="workflow-area"></div>
    </div>
<script>
    const params = new URLSearchParams(window.location.search);
    const cid = params.get('id');
    const type = params.get('type');
    const API_BASE = "https://sheetdb.io/api/v1/vpozwh7cptzc4";

    if (cid && type) {
        const col = encodeURIComponent("Cust_ID(No.)");
        const val = encodeURIComponent(cid);
        const sheet = encodeURIComponent(type);
        const searchUrl = `${API_BASE}/search?${col}=${val}&sheet=${sheet}`;

        fetch(searchUrl)
        .then(res => res.json())
        .then(data => {
            if (data && data.length > 0) {
                startApp(data[0]);
            } else {
                // FALLBACK: Agar bracket ki wajah se search fail ho, toh manual filter karein
                console.log("Fallback Search Triggered...");
                fetch(`${API_BASE}?sheet=${sheet}`)
                .then(r => r.json())
                .then(allData => {
                    const row = allData.find(r => r["Cust_ID(No.)"] == cid);
                    if (row) startApp(row);
                    else showNoData();
                });
            }
        })
        .catch(err => { document.getElementById('status').innerText = "Network Error!"; });
    }

    function showNoData() {
        document.getElementById('status').innerHTML = `<div style="color:red;">ID <b>${cid}</b> Not Found in <b>${type}</b></div>`;
    }
function startApp(d) {
        document.getElementById('status').classList.add('hidden');
        const area = document.getElementById('workflow-area');

        // CATEGORY 1 & 2
        if (type === 'P00_Human' || type === 'P00_Value') {
            area.innerHTML = `
                <div style="font-size: 3rem;">🚨</div>
                <h2>${type === 'P00_Human' ? 'Human Safety' : 'Value Safety'}</h2>
                <p>Owner ko alert bhejne ke liye WhatsApp verify karein.</p>
                <a href="https://wa.me/${d.WACompany}?text=Verify_Alert_ID_${cid}" 
                   onclick="showStep2()" target="_blank" class="btn btn-wa">Verify via WhatsApp</a>
                <div id="step2" class="hidden">
                    <hr><div class="label">Your Number</div><input type="number" id="scNo">
                    <div class="label">Problem</div><textarea id="scDk" rows="2"></textarea>
                    <button class="btn btn-red" onclick="finalSubmit('${d.Email1}','${d.Email2}','${cid}')">Final Submit (Email)</button>
                    ${type === 'P00_Human' ? `
                        <hr><p><b>Owner:</b> Enter PIN for GPS</p>
                        <input type="password" id="oPin"><button class="btn btn-blue" onclick="checkOwner('${d.Owner_PIN}')">Verify</button>
                        <div id="gpsView" class="hidden"><p>📍 GPS LIVE ACTIVE</p></div>
                    ` : ''}
                </div>
                <div class="warning-box">⚠️ Server records your verification number.</div>`;
        }
        // CATEGORY 3
        else if (type === 'P01_Pay') window.location.href = `upi://pay?pa=${d.UPI_ID}&pn=${d.Name}&cu=INR`;
        else if (type === 'P03_Biz') {
            area.innerHTML = `<h2>💼 Biz Card</h2><h3>${d.Name}</h3><a href="tel:${d.Phone}" class="btn btn-blue">Call</a>Social: ${d.Social_Links}`;
        }
        else if (type === 'P04_Review') window.location.href = d.Review_URL;
        else if (type === 'P08_Resume') window.location.href = d.Drive_URL;
        else if (type === 'P09_WiFi') {
            area.innerHTML = `<h2>📶 WiFi</h2><p>SSID: ${d.SSID}</p><button class="btn btn-blue" onclick="navigator.clipboard.writeText('${d.Password}');alert('Copied!')">Copy Pass</button>`;
        }
        else if (type === 'P11_Challan') window.location.href = `https://echallan.parivahan.gov.in/index/accused-challan?vehno=${d.Vehicle_No}`;
        else if (type === 'P12_Invite') {
            area.innerHTML = `<h2>💌 Invite</h2><input type="password" id="iPin"><button class="btn btn-blue" onclick="if(document.getElementById('iPin').value==='${d.PIN}'){alert('${d.Event_Name}')}else{alert('Wrong')}">Open</button>`;
        }
        // CATEGORY 4
        else if (type === 'P13_Doc') {
            area.innerHTML = `<h2>📂 Doc Vault</h2><p>Vehicle: ${d.Gadi_Number}</p><div class="timer" id="timeLeft">20:00</div>
                <button class="btn btn-blue" id="vBtn" onclick="startDocTimer('${d.Drive_Link}')">VIEW DOCUMENTS</button>
                <div id="passArea" class="hidden"><input type="password" id="pdfP" placeholder="PDF Password"></div>`;
        }
    }
function showStep2() { setTimeout(() => { document.getElementById('step2').classList.remove('hidden'); }, 2000); }

    function finalSubmit(e1, e2, id) {
        const p = document.getElementById('scNo').value;
        const r = document.getElementById('scDk').value;
        if(p.length < 10) return alert("Sahi number!");
        
        fetch(`${API_BASE}/Cust_ID(No.)/${id}?sheet=${type}`, {
            method: 'PATCH', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({"ScannerNo.": p, "Dikkat": r})
        });

        let recipients = e1 + (e2 ? "," + e2 : "");
        window.location.href = `mailto:${recipients}?subject=Alert_${id}&body=${r}%20Contact:${p}`;
    }

    function startDocTimer(link) {
        document.getElementById('passArea').classList.remove('hidden');
        window.open(link);
        let sec = 1200; 
        setInterval(() => {
            sec--; let m = Math.floor(sec/60); let s = sec%60;
            document.getElementById('timeLeft').innerText = m + ":" + (s<10?"0":"") + s;
            if(sec<=0) { document.body.innerHTML = "<h1>Expired!</h1>"; }
        }, 1000);
    }

    function checkOwner(correct) {
        if(document.getElementById('oPin').value === correct) document.getElementById('gpsView').classList.remove('hidden');
        else alert("Wrong PIN");
    }
</script>
</body>
</html>
