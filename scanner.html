<script>
    const params = new URLSearchParams(window.location.search);
    const cid = params.get('id');
    const type = params.get('type');
    const display = document.getElementById('display');

    // FIXED: Sahi Sheet Tab mapping jo aapne set kari hai
    const sheetMapping = {
        'P02_Kid': 'P00_Human', 'P05_Women': 'P00_Human', 'P06_Senior': 'P00_Human',
        'P07_Pet': 'P00_Value', 'P10_Luggage': 'P00_Value', 'P14_Vehicle': 'P00_Value',
        'P01_Pay': 'P01_Pay', 'P03_Biz': 'P03_Biz', 'P04_Review': 'P04_Review',
        'P08_Resume': 'P08_Resume', 'P09_WiFi': 'P09_WiFi', 'P11_Challan': 'P11_Challan',
        'P12_Invite': 'P12_Invite', 'P13_Doc': 'P13_Doc'
    };

    if(cid && type) {
        const targetSheet = sheetMapping[type] || type;
        // FIXED: Search query mein 'Cust_ID(No.)' use kiya hai
        fetch(`https://sheetdb.io/api/v1/vpozwh7cptzc4/search?Cust_ID(No.)=${cid}&sheet=${targetSheet}`)
        .then(res => res.json())
        .then(rows => {
            // Hum specifically wo row dhoond rahe hain jiska 'type' bhi match ho
            const activeRow = rows.find(r => r.type === type);
            if(activeRow) renderWorkflow(activeRow, type, targetSheet);
            else display.innerHTML = "<h2 style='color:red'>Data Not Found</h2><p>Invalid QR Code or Expired ID.</p>";
        })
        .catch(err => display.innerHTML = "<h2>Connection Error</h2>");
    }

    function renderWorkflow(d, srv, sheet) {
        let h = `<span class="status-tag">Service: ${srv}</span><hr>`;

        // --- CATEGORY 1: HUMAN SAFETY ---
        if(['P02_Kid', 'P05_Women', 'P06_Senior'].includes(srv)) {
            h += `<h2>🆘 SOS Alert</h2><p>Found <b>${d.Person_Name}</b>?</p>
                  <button class="btn" style="background:var(--green)" onclick="sendWA('${d['Emergency1']}', '${srv}')">WHATSAPP OWNER</button>
                  <hr><p><b>Savior Form (%)</b></p>
                  <input type="text" id="scNo" placeholder="Your Mobile Number">
                  <input type="text" id="scDk" placeholder="What is the problem/location?">
                  <button class="btn" style="background:#444" onclick="updateLog('${d['Cust_ID(No.)']}', '${sheet}')">SEND EMERGENCY LOG</button>
                  <hr><p><b>Owner Mode:</b></p>
                  <input type="password" id="pin" placeholder="Enter Owner PIN">
                  <button class="btn" style="background:var(--navy)" onclick="unlock('${d.Owner_PIN}', 'gps')">VIEW LIVE GPS</button>
                  <div id="gpsData" class="hidden"><p>📍 Location Active:</p><a href="https://www.google.com/maps?q=current+location" target="_blank" class="btn" style="background:var(--blue)">OPEN IN GOOGLE MAPS</a></div>`;
        }

        // --- CATEGORY 2: VALUE SAFETY ---
        else if(['P07_Pet', 'P10_Luggage', 'P14_Vehicle'].includes(srv)) {
            h += `<h2>🐾 Item Recovery</h2><p>Found this ${srv.replace('P','')}? Notify owner below.</p>
                  <button class="btn" style="background:var(--green)" onclick="sendWA('${d.Email1}', 'Recovery')">WHATSAPP OWNER</button>
                  <hr><p><b>Savior Form (%)</b></p>
                  <input type="text" id="scNo" placeholder="Your Contact No.">
                  <input type="text" id="scDk" placeholder="Item Status/Location">
                  <button class="btn" style="background:#444" onclick="updateLog('${d['Cust_ID(No.)']}', '${sheet}')">SYNC TO LOGBOOK</button>`;
        }

        // --- CATEGORY 3 & 4 (Rest of your logic remains same) ---
        else if(srv === 'P01_Pay') {
            h += `<h2>💸 Fast Pay</h2><p>Receiver: <b>${d.Name}</b></p>
                  <a href="upi://pay?pa=${d.UPI_ID}&pn=${d.Name}&cu=INR" class="btn" style="background:var(--red)">PAY VIA UPI</a>`;
        }
        else if(srv === 'P13_Doc') {
            h += `<h2>📂 Secure Doc Vault</h2><p>Vehicle No: ${d.Gadi_Number}</p>
                  <div id="timer">20:00</div>
                  <button class="btn" id="reqBtn" style="background:var(--red)" onclick="requestAccess()">REQUEST DRIVE ACCESS</button>
                  <div id="vaultArea" class="hidden">
                  <hr><p>Owner Approved! Enter PDF Password:</p>
                  <input type="password" id="pdfP" placeholder="PDF Password">
                  <button class="btn" style="background:var(--navy)" onclick="unlock('${d.Drive_Password}', 'vault')">VIEW DOCUMENTS</button>
                  <div id="vaultLink" class="hidden"><a href="${d.Drive_Link}" target="_blank" class="btn" style="background:var(--green)">OPEN DRIVE FOLDER</a></div>
                  </div>`;
            startTimer(1200);
        }
        // ... (Baki services ka code yahan aayega)
        
        display.innerHTML = h;
    }

    // --- CORE LOGIC FUNCTIONS ---
    function updateLog(id, sheet) {
        const no = document.getElementById('scNo').value;
        const dk = document.getElementById('scDk').value;
        if(!no || !dk) return alert("Please fill your number and problem!");
        
        // FIXED: Column name matches your sheet
        fetch(`https://sheetdb.io/api/v1/vpozwh7cptzc4/Cust_ID(No.)/${id}?sheet=${sheet}`, {
            method: 'PATCH', 
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ "ScannerNo": no, "Dikkat": dk, "Timestamp": new Date().toLocaleString() })
        }).then(() => alert("Owner notified and Log updated!"));
    }

    function unlock(correct, elementId) {
        let input = (elementId === 'gps') ? document.getElementById('pin').value : 
                    (elementId === 'inv') ? document.getElementById('iPin').value :
                    document.getElementById('pdfP').value;

        if(input === correct) {
            document.getElementById(elementId === 'vault' ? 'vaultLink' : (elementId + 'Data')).classList.remove('hidden');
        } else {
            alert("Wrong Password/PIN!");
        }
    }
    // ... (startTimer and sendWA functions remain same)
</script>
