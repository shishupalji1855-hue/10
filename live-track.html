<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>10haath Live Track</title>
    <style>
      body { font-family: Arial, sans-serif; background: #0f1d33; color: #fff; margin: 0; }
      .wrap { max-width: 520px; margin: 0 auto; padding: 24px; }
      .card { background: #fff; color: #1b1b1b; border-radius: 14px; padding: 16px; }
      .btn { display: inline-block; margin-top: 12px; background: #0f7a6d; color: #fff; padding: 10px 14px; border-radius: 10px; text-decoration: none; }
      input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h2>Live Location</h2>
      <div class="card">
        <p>Your live location link (auto-generated):</p>
        <input id="liveLink" readonly />
        <a class="btn" id="copyBtn" href="#">COPY LINK</a>
        <p id="status" style="margin-top:12px;"></p>
      </div>
    </div>
    <script>
      const liveLinkEl = document.getElementById("liveLink");
      const statusEl = document.getElementById("status");
      const link = window.location.href;
      liveLinkEl.value = link;
      document.getElementById("copyBtn").addEventListener("click", async (e) => {
        e.preventDefault();
        try { await navigator.clipboard.writeText(link); statusEl.textContent = "Copied."; }
        catch (err) { statusEl.textContent = "Copy failed."; }
      });
    </script>
  </body>
</html>
