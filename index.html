<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>10haath Master Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --red: #e63946; --blue: #1d3557; --gray: #f4f7f6; --green: #2a9d8f; --orange: #f4a261; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); padding: 20px; }
        .card { background: white; max-width: 650px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin: auto; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .cat-btn { padding: 20px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .cat1 { background: var(--red); } .cat2 { background: var(--orange); } 
        .cat3 { background: var(--green); } .cat4 { background: #457b9d; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #formArea { display: none; text-align: left; margin-top: 20px; }
        #qrResult { display: none; margin-top: 30px; padding: 20px; border: 2px dashed var(--blue); border-radius: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🖐️ 10haath Master Dashboard</h2>
    <div class="grid" id="catGrid">
        <button class="cat-btn cat1" onclick="openDirect('P00_Human', 'Cat 1: Human Safety')">CAT 1: HUMAN SAFETY</button>
        <button class="cat-btn cat2" onclick="openDirect('P00_Value', 'Cat 2: Value Safety')">CAT 2: VALUE SAFETY</button>
        <button class="cat-btn cat3" onclick="loadCat3Menu()">CAT 3: SMART SERVICES</button>
        <button class="cat-btn cat4" onclick="openDirect('P13_Doc', 'Cat 4: Doc Vault')">CAT 4: DOC VAULT</button>
    </div>

    <div id="formArea">
        <button onclick="location.reload()" style="background:none; border:none; color:var(--red); cursor:pointer; font-weight:bold;">← Back</button>
        <h3 id="catTitle" style="color:var(--blue); margin-bottom:15px;"></h3>
        <div id="subSelectArea"></div>
        <div id="fieldsArea"></div>
        <button class="btn" onclick="generateAndSync()">CREATE QR & SYNC DATA</button>
    </div>

    <div id="qrResult">
        <div id="qrcode" style="display: flex; justify-content: center;"></div>
        <p id="qrIDLabel" style="font-weight:bold; color:var(--blue); margin-top:10px;"></p>
    </div>
</div>

<script>
    let currentSheet = "";
    
    // Exact Protocol Mapping: Only # and $ fields are in Builder
    const fieldConfig = {
        "P00_Human": ["Person_Name", "Emergency1", "Emergency2", "Emergency3", "Email1", "Email2", "WACompany", "Owner_PIN"],
        "P00_Value": ["Person_Name", "Email1", "Email2", "WACompany"],
        "P01_Pay": ["Name", "UPI_ID"],
        "P03_Biz": ["Name", "Job", "Phone", "Social_Links"],
        "P04_Review": ["Name", "Review_URL"],
        "P08_Resume": ["Name", "Drive_URL"],
        "P09_WiFi": ["Name", "SSID", "Password"],
        "P11_Challan": ["Name", "Vehicle_No", "Engine_No", "Chassis_No"],
        "P12_Invite": ["Name", "PIN", "Event_Name", "Date", "Maps_Link", "Video_Link"],
        "P13_Doc": ["Name", "Gadi_Number", "Drive_Link", "Drive_Password", "Password_Free_PDF_Link"]
    };

    function openDirect(sheet, title) {
        currentSheet = sheet;
        document.getElementById('catGrid').style.display = 'none';
        document.getElementById('formArea').style.display = 'block';
        document.getElementById('catTitle').innerText = title;
        document.getElementById('subSelectArea').innerHTML = "";
        renderBuilderFields(fieldConfig[sheet]);
    }

    function loadCat3Menu() {
        document.getElementById('catGrid').style.display = 'none';
        document.getElementById('formArea').style.display = 'block';
        document.getElementById('catTitle').innerText = "Category 3 Services";
        
        let html = `<select id="subType" onchange="currentSheet=this.value; renderBuilderFields(fieldConfig[this.value])">
                        <option value="">-- Choose Service --</option>
                        <option value="P01_Pay">P01 Pay</option>
                        <option value="P03_Biz">P03 Biz</option>
                        <option value="P04_Review">P04 Review</option>
                        <option value="P08_Resume">P08 Resume</option>
                        <option value="P09_WiFi">P09 WiFi</option>
                        <option value="P11_Challan">P11 Challan</option>
                        <option value="P12_Invite">P12 Invite</option>
                    </select>`;
        document.getElementById('subSelectArea').innerHTML = html;
        document.getElementById('fieldsArea').innerHTML = "";
    }

    function renderBuilderFields(fields) {
        const area = document.getElementById('fieldsArea');
        area.innerHTML = `<input type="text" id="Cust_ID" placeholder="Cust_ID ($)">`;
        fields.forEach(f => {
            area.innerHTML += `<input type="text" id="${f}" placeholder="${f.replace(/_/g,' ')} (#)">`;
        });
    }

    function generateAndSync() {
        const cid = document.getElementById('Cust_ID').value;
        if(!cid || !currentSheet) return alert("Pehle ID aur fields bharo!");

        const scanUrl = `https://shishupalji1855-hue.github.io/10/scanner.html?id=${cid}&type=${currentSheet}`;
        
        document.getElementById('qrResult').style.display = "block";
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: scanUrl, width: 200, height: 200 });
        document.getElementById('qrIDLabel').innerText = "ID: " + cid;

        // Automated Field (!): Timestamp added here
        let data = { "Timestamp": new Date().toLocaleString(), "Cust_ID(No.)": cid };
        fieldConfig[currentSheet].forEach(f => { data[f] = document.getElementById(f).value; });

        fetch(`https://sheetdb.io/api/v1/vpozwh7cptzc4?sheet=${currentSheet}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        }).then(res => res.ok ? alert("Data Saved in " + currentSheet) : alert("Sheet Error!"));
    }
</script>
</body>
</html>
