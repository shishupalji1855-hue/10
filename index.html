<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>10haath Master Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --red: #e63946; --blue: #1d3557; --gray: #f4f7f6; --green: #2a9d8f; --orange: #f4a261; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); padding: 20px; }
        .card { background: white; max-width: 650px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin: auto; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .cat-btn { padding: 20px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .cat1 { background: var(--red); } .cat2 { background: var(--orange); } 
        .cat3 { background: var(--green); } .cat4 { background: #457b9d; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #formArea { display: none; text-align: left; margin-top: 20px; }
        #qrResult { display: none; margin-top: 30px; padding: 20px; border: 2px dashed var(--blue); border-radius: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🖐️ 10haath Master Dashboard</h2>
    <div class="grid" id="catGrid">
        <button class="cat-btn cat1" onclick="openDirect('P00_Human')">CAT 1: HUMAN SAFETY<br>(SOS & GPS)</button>
        <button class="cat-btn cat2" onclick="openDirect('P00_Value')">CAT 2: VALUE SAFETY<br>(Pet/Luggage/Vehicle)</button>
        <button class="cat-btn cat3" onclick="alert('Bhai, abhi CAT 1 aur 2 test karo!')">CAT 3: SMART SERVICES</button>
        <button class="cat-btn cat4" onclick="alert('Coming Soon!')">CAT 4: DOC VAULT</button>
    </div>

    <div id="formArea">
        <button onclick="location.reload()" style="background:none; border:none; color:var(--red); cursor:pointer; font-weight:bold;">← Back</button>
        <h3 id="catTitle" style="color:var(--blue); margin-bottom:15px;"></h3>
        <div id="fieldsArea"></div>
        <button class="btn" onclick="generateAndSync()">CREATE QR & SYNC DATA</button>
    </div>

    <div id="qrResult">
        <div id="qrcode" style="display: flex; justify-content: center;"></div>
        <p id="qrIDLabel" style="font-weight:bold; color:var(--blue); margin-top:10px;"></p>
    </div>
</div>

<script>
    let currentType = "";
    // Photo Audit: Column names exact match as per your Google Sheet
    const fieldConfig = {
        "P00_Human": ["Person_Name", "Emergency1", "Emergency2", "Emergency3", "Email1", "Email2", "WACompany", "Owner_PIN"],
        "P00_Value": ["Person_Name", "Email1", "Email2", "WACompany"]
    };

    function openDirect(type) {
        currentType = type;
        document.getElementById('catGrid').style.display = 'none';
        document.getElementById('formArea').style.display = 'block';
        document.getElementById('catTitle').innerText = (type === "P00_Human") ? "Human Safety Form" : "Value Safety Form";
        
        const area = document.getElementById('fieldsArea');
        area.innerHTML = `<input type="text" id="Cust_ID" placeholder="Unique ID (e.g. 7894)">`;
        fieldConfig[type].forEach(f => {
            area.innerHTML += `<input type="text" id="${f}" placeholder="${f.replace(/_/g,' ')}">`;
        });
    }

    function generateAndSync() {
        const cid = document.getElementById('Cust_ID').value;
        if(!cid) return alert("ID toh dalo bhai!");

        // GitHub Link
        const scanUrl = `https://shishupalji1855-hue.github.io/10/scanner.html?id=${cid}&type=${currentType}`;
        
        document.getElementById('qrResult').style.display = "block";
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: scanUrl, width: 200, height: 200 });
        document.getElementById('qrIDLabel').innerText = "ID: " + cid;

        // Data object creation
        let data = { 
            "Timestamp": new Date().toLocaleString(),
            "Cust_ID(No.)": cid 
        };
        fieldConfig[currentType].forEach(f => { data[f] = document.getElementById(f).value; });

        // SheetDB Call
        fetch(`https://sheetdb.io/api/v1/vpozwh7cptzc4?sheet=${currentType}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        })
        .then(res => res.ok ? alert("Data Saved in " + currentType) : alert("Sheet Error! Check Tab Name."))
        .catch(err => alert("Internet check karo!"));
    }
</script>
</body>
</html>
